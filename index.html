<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语默写闯关</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-bottom: 50px; }
.container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 36px 40px; width: 680px; max-width: 95vw; position: relative; }
h1 { text-align: center; font-size: 1.5rem; color: #3b4a6b; margin-bottom: 24px; }
.vocab-checklist { border: 1.5px solid #d0d7f0; border-radius: 10px; background: #f7f8fc; max-height: 220px; overflow-y: auto; margin-bottom: 10px; }
.select-all-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1.5px solid #d0d7f0; background: #eef1ff; border-radius: 10px 10px 0 0; }
.select-all-row label { font-size: 0.85rem; color: #5b7fff; cursor: pointer; font-weight: 600; }
.vocab-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #eef0f8; cursor: pointer; transition: background .15s; }
.vocab-item:last-child { border-bottom: none; }
.vocab-item:hover { background: #eef1ff; }
.vocab-item input[type=checkbox], .select-all-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #5b7fff; cursor: pointer; flex-shrink: 0; }
.vocab-item label { cursor: pointer; font-size: 0.95rem; color: #3b4a6b; flex: 1; }
.vocab-loading { padding: 16px; text-align: center; color: #aaa; font-size: 0.9rem; }
.selected-hint { font-size: 0.8rem; color: #999; margin-bottom: 12px; min-height: 18px; }
#start-btn { display: block; width: 100%; margin-top: 4px; padding: 12px; background: #5b7fff; color: #fff; border: none; border-radius: 10px; font-size: 1.05rem; cursor: pointer; }
#start-btn:hover:not(:disabled) { background: #3a5fef; }
#start-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
.error-bank-btn { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: 12px; padding: 12px 16px; background: #fff7ed; color: #c2410c; border: 1.5px solid #fed7aa; border-radius: 10px; font-size: 1rem; cursor: pointer; transition: background .2s; }
.error-bank-btn:hover:not(:disabled) { background: #ffedd5; }
.error-bank-btn:disabled { opacity: .4; cursor: not-allowed; }
.error-bank-badge { background: #f97316; color: #fff; border-radius: 99px; padding: 2px 10px; font-size: 0.82rem; font-weight: 700; }
.error-bank-clear { font-size: 0.78rem; color: #999; text-align: center; margin-top: 8px; cursor: pointer; text-decoration: underline; }
.error-bank-clear:hover { color: #e05; }
#practice-page { display: none; }
.progress-bar-wrap { background: #e8ecff; border-radius: 99px; height: 7px; margin-bottom: 6px; }
.progress-bar { background: #5b7fff; height: 7px; border-radius: 99px; transition: width .4s; }
.progress-text { text-align: right; font-size: 0.8rem; color: #999; margin-bottom: 20px; }
.mode-tag { text-align: center; font-size: 0.78rem; color: #f97316; font-weight: 600; margin-bottom: 8px; min-height: 16px; letter-spacing: 1px; }
.chinese-word { text-align: center; font-size: 1.6rem; font-weight: 700; color: #3b4a6b; margin-bottom: 24px; letter-spacing: 1px; line-height: 1.4; }
.hint-label { text-align: center; font-size: 0.88rem; color: #f59e0b; min-height: 22px; margin-bottom: 12px; font-weight: 500; letter-spacing: 2px; }
.hint-pick-tip { text-align: center; font-size: 0.82rem; color: #f97316; min-height: 20px; margin-bottom: 8px; }
.letter-boxes { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; cursor: text; line-height: 2.2; }
.letter-box { width: 28px; height: 36px; border-bottom: 2.5px solid #a0aec0; display: flex; align-items: flex-end; justify-content: center; font-size: 1.2rem; font-weight: 600; color: #3b4a6b; padding-bottom: 2px; position: relative; }
.letter-box.space { border-bottom: none; width: 20px; }
.letter-box.symbol { border-bottom: none; width: auto; min-width: 8px; color: #718096; }
.letter-box.hint-char { color: #f59e0b; border-bottom-color: #f59e0b; }
.letter-box.typed-char { color: #3b4a6b; border-bottom-color: #5b7fff; }
.letter-box.correct-char { color: #10b981; border-bottom-color: #10b981; animation: correct-pop 0.3s ease; }
.letter-box.cursor { border-bottom-color: #5b7fff; }
.letter-box.cursor::after { content:''; display:block; width:2px; height:16px; background:#5b7fff; position:absolute; bottom:4px; animation: blink .8s infinite; }
.letter-boxes.picking .letter-box.pickable { border-bottom-color: #f97316; cursor: pointer; background: #fff7ed; border-radius: 4px 4px 0 0; }
.letter-boxes.picking .letter-box.pickable:hover { background: #ffedd5; border-bottom-color: #ea580c; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
@keyframes correct-pop { 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
.letter-boxes.shake { animation: shake .3s; }
.pencil-input-wrap { display: flex; justify-content: center; margin-bottom: 20px; }
.pencil-input { width: 100%; max-width: 400px; border: 1px solid #d0d7f0; background: #f7f8fc; border-radius: 8px; padding: 10px; font-size: 1.1rem; text-align: center; outline: none; color: #3b4a6b; caret-color: #5b7fff; letter-spacing: 1px; }
.pencil-input:focus { border-color: #5b7fff; background: #fff; }
.btn-row { display: flex; gap: 10px; }
.btn-submit { flex: 2; padding: 12px; background: #5b7fff; color: #fff; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
.btn-submit:hover { background: #3a5fef; }
.btn-submit:disabled { background: #a0aec0; cursor: default; }
.btn-hint { flex: 1; padding: 12px; background: #fff7ed; color: #c2410c; border: 1.5px solid #fed7aa; border-radius: 10px; font-size: 0.9rem; cursor: pointer; }
.btn-hint:hover:not(:disabled) { background: #ffedd5; }
.btn-hint:disabled { opacity: .35; cursor: default; }
.btn-hint.picking { background: #ffedd5; border-color: #f97316; font-weight: 600; }
#result-page { display: none; }
.score-circle { width: 110px; height: 110px; border-radius: 50%; background: #5b7fff; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 24px; box-shadow: 0 4px 16px rgba(91,127,255,.35); }
.score-num { font-size: 2.2rem; font-weight: 800; line-height: 1; }
.score-lbl { font-size: 0.75rem; opacity: .85; margin-top: 2px; }
.result-section { margin-bottom: 18px; }
.result-section h3 { font-size: 0.9rem; color: #718096; margin-bottom: 8px; }
.result-tag { display: inline-block; border-radius: 6px; padding: 6px 12px; margin: 4px; font-size: 0.88rem; }
.result-tag.missed { border: 1px solid #f59e0b; color: #92400e; background: #fffbeb; }
.result-error-hint { font-size: 0.8rem; color: #f97316; margin-top: 12px; text-align: center; }
#redo-btn { display: block; width: 100%; margin-top: 16px; padding: 12px; background: #f7f8fc; color: #5b7fff; border: 1.5px solid #5b7fff; border-radius: 10px; font-size: 1rem; cursor: pointer; }
#redo-btn:hover { background: #eef1ff; }
#restart-btn { display: block; width: 100%; margin-top: 10px; padding: 12px; background: #5b7fff; color: #fff; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
#restart-btn:hover { background: #3a5fef; }
audio { display: none; }
</style>
</head>
<body>
<div class="container">
  <div id="input-page">
    <h1>📖 英语默写闯关</h1>
    <div class="vocab-checklist" id="vocab-list">
      <div class="vocab-loading">正在加载词库列表…</div>
    </div>
    <div class="selected-hint" id="selected-hint"></div>
    <button id="start-btn" disabled>开始练习 →</button>
    <button class="error-bank-btn" id="error-bank-btn" disabled>
      <span>📕 练习错题集</span>
      <span class="error-bank-badge" id="error-bank-count">0</span>
    </button>
    <div class="error-bank-clear" id="error-bank-clear" style="display:none">清空错题集</div>
  </div>

  <div id="practice-page">
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="progress-text" id="prog-text"></div>
    <div class="mode-tag" id="mode-tag"></div>
    <div class="chinese-word" id="chinese-display"></div>
    <div class="hint-label" id="hint-label"></div>
    <div class="hint-pick-tip" id="hint-pick-tip"></div>
    <div class="letter-boxes" id="letter-boxes"></div>
    <div class="pencil-input-wrap">
      <input class="pencil-input" id="pencil-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="在此处手写或输入字母">
    </div>
    <div class="btn-row">
      <button class="btn-submit" id="submit-btn">提交</button>
      <button class="btn-hint" id="hint-btn">提示</button>
    </div>
  </div>

  <div id="result-page">
    <h1>🎉 本轮结果</h1>
    <div class="score-circle">
      <div class="score-num" id="score-num"></div>
      <div class="score-lbl">答对</div>
    </div>
    <div class="result-section" id="missed-section">
      <h3>❌ 提示后答对 / 超出提示</h3>
      <div id="missed-list"></div>
    </div>
    <div class="result-error-hint" id="result-error-hint"></div>
    <button id="redo-btn">重练错题</button>
    <button id="restart-btn">重新选择练习内容</button>
  </div>
</div>

<audio id="audio-success" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
<audio id="audio-error" src="https://assets.mixkit.co/active_storage/sfx/213/213-preview.mp3" preload="auto"></audio>
<audio id="audio-cheer" src="https://assets.mixkit.co/active_storage/sfx/1993/1993-preview.mp3" preload="auto"></audio>
<audio id="audio-hint" src="https://assets.mixkit.co/active_storage/sfx/2574/2574-preview.mp3" preload="auto"></audio>
<script>
(function(){
  const GITHUB_USERNAME = 'kirasunil4807-dotcom';
  const REPO_NAME = 'enlearner';
  const BASE = 'https://raw.githubusercontent.com/'+GITHUB_USERNAME+'/'+REPO_NAME+'/main/';
  const LS_KEY = 'vocab_error_bank';

  var words=[], queue=[], results=[];
  var cur=0, wrongAttempts=0, submitAttempts=0;
  var locked=false, typed='';
  var revealedPos=[];
  var isErrorBankMode=false;
  var pickingHint=false;

  const soundSuccess = document.getElementById('audio-success');
  const soundError   = document.getElementById('audio-error');
  const soundCheer   = document.getElementById('audio-cheer');
  const soundHint    = document.getElementById('audio-hint');

  function $(id){ return document.getElementById(id); }
  function shuffle(arr){ for(var i=arr.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)),t=arr[i];arr[i]=arr[j];arr[j]=t; } return arr; }
  function showPage(id){ ['input-page','practice-page','result-page'].forEach(function(p){ $(p).style.display=p===id?'block':'none'; }); }
  function isLetter(c){ return /^[a-zA-Z]$/.test(c); }
  function getLetterSlots(str){ var s=[]; for(var i=0;i<str.length;i++) if(isLetter(str[i])) s.push(i); return s; }

  function loadErrorBank(){ try { return JSON.parse(localStorage.getItem(LS_KEY))||[]; } catch(e){ return []; } }
  function saveErrorBank(bank){ localStorage.setItem(LS_KEY, JSON.stringify(bank)); }
  function addToErrorBank(word){
    var bank=loadErrorBank();
    if(!bank.some(function(w){ return w.en===word.en; })){ bank.push({en:word.en,zh:word.zh}); saveErrorBank(bank); }
    updateErrorBankUI();
  }
  function removeFromErrorBank(word){
    saveErrorBank(loadErrorBank().filter(function(w){ return w.en!==word.en; }));
    updateErrorBankUI();
  }
  function updateErrorBankUI(){
    var count=loadErrorBank().length;
    $('error-bank-count').textContent=count;
    $('error-bank-btn').disabled=count===0;
    $('error-bank-clear').style.display=count>0?'block':'none';
  }

  $('error-bank-clear').onclick=function(){ if(confirm('确定清空全部错题？')){ saveErrorBank([]); updateErrorBankUI(); } };
  $('error-bank-btn').onclick=function(){
    var bank=loadErrorBank(); if(!bank.length) return;
    isErrorBankMode=true;
    queue=shuffle(bank.slice()); results=[]; cur=0;
    showPage('practice-page');
    $('mode-tag').textContent='📕 错题集模式';
    loadQuestion();
  };

  (async function loadIndex(){
    try {
      var res=await fetch(BASE+'index.json');
      var list=await res.json();
      var container=$('vocab-list');
      container.innerHTML='';
      var allRow=document.createElement('div'); allRow.className='select-all-row';
      var allCb=document.createElement('input'); allCb.type='checkbox'; allCb.id='cb-all';
      var allLbl=document.createElement('label'); allLbl.htmlFor='cb-all'; allLbl.textContent='全选';
      allRow.appendChild(allCb); allRow.appendChild(allLbl);
      container.appendChild(allRow);
      list.forEach(function(item){
        var row=document.createElement('div'); row.className='vocab-item';
        var cb=document.createElement('input'); cb.type='checkbox'; cb.value=item.value; cb.id='cb-'+item.value; cb.className='vocab-cb';
        var lbl=document.createElement('label'); lbl.htmlFor='cb-'+item.value; lbl.textContent=item.label;
        row.appendChild(cb); row.appendChild(lbl);
        row.onclick=function(e){ if(e.target!==cb) cb.checked=!cb.checked; updateSelection(); };
        cb.onchange=updateSelection;
        container.appendChild(row);
      });
      allCb.onchange=function(){ document.querySelectorAll('.vocab-cb').forEach(function(c){ c.checked=allCb.checked; }); updateSelection(); };
    } catch(e){ $('vocab-list').innerHTML='<div class="vocab-loading">词库列表加载失败</div>'; }
  })();

  function getChecked(){ return Array.from(document.querySelectorAll('.vocab-cb:checked')).map(function(c){ return c.value; }); }
  function updateSelection(){
    var checked=getChecked(), all=document.querySelectorAll('.vocab-cb'), allCb=$('cb-all');
    if(allCb) allCb.checked=checked.length===all.length&&all.length>0;
    $('start-btn').disabled=checked.length===0;
    $('selected-hint').textContent=checked.length>0?'已选 '+checked.length+' 个词库':'';
  }

  $('start-btn').onclick=async function(){
    var selected=getChecked(); if(!selected.length) return;
    $('start-btn').textContent='正在加载…'; $('start-btn').disabled=true;
    try {
      var all=await Promise.all(selected.map(function(file){
        return fetch(BASE+'vocabulary/'+file+'.json').then(function(r){ if(!r.ok) throw new Error(file+' 加载失败'); return r.json(); });
      }));
      words=[];
      all.forEach(function(data){ data.forEach(function(item){ words.push({en:item.word.trim(),zh:item.translation.trim()}); }); });
      if(!words.length){ alert('所选词库内容为空！'); return; }
      isErrorBankMode=false;
      queue=shuffle(words.slice()); results=[]; cur=0;
      showPage('practice-page');
      $('mode-tag').textContent='';
      loadQuestion();
    } catch(e){ alert('❌ 载入失败：'+e.message); }
    finally { $('start-btn').textContent='开始练习 →'; updateSelection(); }
  };

  function updateProgress(){ var pct=queue.length?(cur/queue.length*100).toFixed(0):0; $('prog-bar').style.width=pct+'%'; $('prog-text').textContent=cur+' / '+queue.length; }

  function hintLabelText(){
    if(!revealedPos.length) return '';
    return queue[cur].en.split('').map(function(c,i){ if(!isLetter(c)) return c; return revealedPos.indexOf(i)>=0?c:'_'; }).join(' ');
  }

  function renderBoxes(){
    var w=queue[cur], el=$('letter-boxes');
    var letterSlots=getLetterSlots(w.en);
    var nonHint=letterSlots.filter(function(p){ return revealedPos.indexOf(p)<0; });
    var cursorPos=nonHint[typed.length];
    el.innerHTML='';
    for(var i=0;i<w.en.length;i++){
      var c=w.en[i], box=document.createElement('div');
      if(c===' '){ box.className='letter-box space'; }
      else if(!isLetter(c)){ box.className='letter-box symbol'; box.textContent=c; }
      else {
        box.className='letter-box';
        if(revealedPos.indexOf(i)>=0){ box.textContent=c; box.className+=' hint-char'; }
        else {
          var ui=nonHint.indexOf(i);
          if(ui>=0&&ui<typed.length){ box.textContent=typed[ui]; box.className+=' typed-char'; }
          else if(i===cursorPos&&!locked&&!pickingHint){ box.className+=' cursor'; }
          if(pickingHint && revealedPos.indexOf(i)<0){
            box.className+=' pickable';
            (function(pos){ box.onclick=function(e){ e.stopPropagation(); pickLetter(pos); }; })(i);
          }
        }
      }
      el.appendChild(box);
    }
    if(pickingHint) el.classList.add('picking');
    else el.classList.remove('picking');
  }

  function loadQuestion(){
    if(cur>=queue.length){ soundCheer.currentTime=0; soundCheer.play().catch(function(){}); showResults(); return; }
    wrongAttempts=0; submitAttempts=0; locked=false; typed=''; revealedPos=[]; pickingHint=false;
    updateProgress();
    $('chinese-display').textContent=queue[cur].zh;
    $('hint-label').textContent='';
    $('hint-label').classList.remove('fail');
    $('hint-pick-tip').textContent='';
    $('letter-boxes').classList.remove('shake');
    $('submit-btn').disabled=false;
    $('hint-btn').disabled=false;
    $('hint-btn').classList.remove('picking');
    $('hint-btn').textContent='提示';
    $('pencil-input').value=''; $('pencil-input').disabled=false;
    renderBoxes();
    $('pencil-input').focus();
  }

  function enterPickMode(){
    var letterSlots=getLetterSlots(queue[cur].en);
    var available=letterSlots.filter(function(p){ return revealedPos.indexOf(p)<0; });
    if(!available.length) return;
    pickingHint=true;
    $('hint-btn').classList.add('picking');
    $('hint-btn').textContent='取消';
    $('hint-pick-tip').textContent='👆 点击你想查看的字母位置';
    renderBoxes();
  }

  function exitPickMode(){
    pickingHint=false;
    $('hint-btn').classList.remove('picking');
    $('hint-btn').textContent='提示';
    $('hint-pick-tip').textContent='';
    renderBoxes();
    $('pencil-input').focus();
  }

  function pickLetter(pos){
    revealedPos.push(pos);
    wrongAttempts++;
    pickingHint=false;
    $('hint-btn').classList.remove('picking');
    $('hint-pick-tip').textContent='';
    var w=queue[cur];
    if(wrongAttempts>=2){ $('hint-btn').disabled=true; }
    soundHint.currentTime=0; soundHint.play().catch(function(){});
    $('hint-label').textContent=hintLabelText();
    $('hint-btn').textContent='提示';
    typed=''; $('pencil-input').value='';
    renderBoxes();
    $('pencil-input').focus();
  }

  $('hint-btn').onclick=function(){
    if(locked) return;
    if(pickingHint){ exitPickMode(); } else { enterPickMode(); }
  };

  function doSubmit(){
    if(locked||!typed) return;
    if(pickingHint){ exitPickMode(); return; }
    var w=queue[cur], correctRaw=w.en.toLowerCase().replace(/[^a-z]/g,'');
    var letterSlots=getLetterSlots(w.en);
    var nonHint=letterSlots.filter(function(p){ return revealedPos.indexOf(p)<0; });
    var ansArr=[], ti=0;
    for(var i=0;i<w.en.length;i++){
      if(!isLetter(w.en[i])) continue;
      if(revealedPos.indexOf(i)>=0) ansArr.push(w.en[i].toLowerCase());
      else if(ti<typed.length){ ansArr.push(typed[ti].toLowerCase()); ti++; }
    }
    if(ansArr.join('')===correctRaw){
      soundSuccess.currentTime=0; soundSuccess.play().catch(function(){});
      locked=true;
      $('letter-boxes').querySelectorAll('.letter-box').forEach(function(b){ if(!b.classList.contains('space')&&!b.classList.contains('symbol')) b.className='letter-box correct-char'; });
      var status=wrongAttempts===0&&submitAttempts===0?'correct':'hinted';
      results.push({en:w.en, zh:w.zh, status:status});
      if(status==='correct'){ if(isErrorBankMode) removeFromErrorBank(w); }
      else { addToErrorBank(w); }
      $('pencil-input').disabled=true;
      $('hint-btn').disabled=true;
      setTimeout(function(){ cur++; loadQuestion(); }, 900);
    } else {
      soundError.currentTime=0; soundError.play().catch(function(){});
      submitAttempts++;
      var hintDisabled = $('hint-btn').disabled;
      if(submitAttempts>=2){ $('hint-btn').disabled=true; }
      if(submitAttempts>=3){
        locked=true;
        results.push({en:w.en, zh:w.zh, status:'hinted'});
        addToErrorBank(w);
        $('submit-btn').disabled=true;
        $('hint-btn').disabled=true;
        $('hint-label').textContent='答案：'+w.en;
        $('hint-label').classList.add('fail');
        setTimeout(function(){ cur++; loadQuestion(); }, 2000);
        return;
      }
      var el=$('letter-boxes');
      el.classList.add('shake');
      setTimeout(function(){
        el.classList.remove('shake');
        typed=''; $('pencil-input').value='';
        renderBoxes();
        if(!$('hint-btn').disabled) enterPickMode();
      }, 350);
    }
  }

  $('pencil-input').addEventListener('input', function(e){
    if(locked) return;
    if(pickingHint){ e.target.value=typed; return; }
    var maxLen=getLetterSlots(queue[cur].en).length-revealedPos.length;
    var val=e.target.value.replace(/[^a-zA-Z]/g,'').toLowerCase().slice(0,maxLen);
    typed=val; e.target.value=val; renderBoxes();
  });
  $('pencil-input').addEventListener('keydown', function(e){ if(e.key==='Enter'){ doSubmit(); e.preventDefault(); } });
  $('letter-boxes').onclick=function(e){ if(!pickingHint) $('pencil-input').focus(); };
  $('submit-btn').onclick=doSubmit;

  function showResults(){
    showPage('result-page');
    var ok=results.filter(function(r){ return r.status==='correct'; }).length;
    $('score-num').textContent=ok+'/'+results.length;
    var missed=results.filter(function(r){ return r.status==='hinted'; });
    function fill(arr,elId,cls){ var el=$(elId); el.innerHTML=''; arr.forEach(function(w){ var t=document.createElement('span'); t.className='result-tag '+cls; t.textContent=w.en+' | '+w.zh; el.appendChild(t); }); }
    $('missed-section').style.display=missed.length?'':'none';
    fill(missed,'missed-list','missed');
    var bank=loadErrorBank();
    if(isErrorBankMode){
      var removed=results.filter(function(r){ return r.status==='correct'; }).length;
      $('result-error-hint').textContent=removed>0?'✅ '+removed+' 个词已从错题集移除，剩余 '+bank.length+' 个':'错题集剩余 '+bank.length+' 个';
    } else {
      $('result-error-hint').textContent=missed.length>0?'📕 已加入错题集，当前共 '+bank.length+' 个':'';
    }
    $('redo-btn').style.display=missed.length?'block':'none';
    $('redo-btn').onclick=function(){ queue=missed.map(function(w){ return {en:w.en,zh:w.zh}; }); results=[]; cur=0; isErrorBankMode=false; showPage('practice-page'); $('mode-tag').textContent=''; loadQuestion(); };
  }

  $('restart-btn').onclick=function(){ updateErrorBankUI(); showPage('input-page'); };
  updateErrorBankUI();
})();
</script>
</body>
</html>
