<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>词汇背诵</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f4ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 36px 40px; width: 560px; max-width: 95vw; }
h1 { text-align: center; font-size: 1.5rem; color: #3b4a6b; margin-bottom: 24px; }

/* Input page */
.vocab-checklist { border: 1.5px solid #d0d7f0; border-radius: 10px; background: #f7f8fc; max-height: 220px; overflow-y: auto; margin-bottom: 10px; }
.select-all-row { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-bottom: 1.5px solid #d0d7f0; background: #eef1ff; border-radius: 10px 10px 0 0; }
.select-all-row label { font-size: 0.85rem; color: #5b7fff; cursor: pointer; font-weight: 600; }
.vocab-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid #eef0f8; cursor: pointer; transition: background .15s; }
.vocab-item:last-child { border-bottom: none; }
.vocab-item:hover { background: #eef1ff; }
.vocab-item input[type=checkbox], .select-all-row input[type=checkbox] { width: 16px; height: 16px; accent-color: #5b7fff; cursor: pointer; flex-shrink: 0; }
.vocab-item label { cursor: pointer; font-size: 0.95rem; color: #3b4a6b; flex: 1; }
.vocab-loading { padding: 16px; text-align: center; color: #aaa; font-size: 0.9rem; }
.selected-hint { font-size: 0.8rem; color: #999; margin-bottom: 12px; min-height: 18px; }
.mode-row { display: flex; gap: 10px; margin-bottom: 16px; }
.mode-btn { flex: 1; padding: 10px 6px; border: 1.5px solid #d0d7f0; border-radius: 10px; background: #f7f8fc; color: #718096; font-size: 0.9rem; cursor: pointer; text-align: center; transition: all .2s; }
.mode-btn.active { border-color: #5b7fff; background: #eef1ff; color: #5b7fff; font-weight: 600; }
#go-btn { display: block; width: 100%; padding: 12px; background: #5b7fff; color: #fff; border: none; border-radius: 10px; font-size: 1.05rem; cursor: pointer; }
#go-btn:hover:not(:disabled) { background: #3a5fef; }
#go-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

/* Review page */
#review-page { display: none; }
.progress-bar-wrap { background: #e8ecff; border-radius: 99px; height: 7px; margin-bottom: 6px; }
.progress-bar { background: #5b7fff; height: 7px; border-radius: 99px; transition: width .4s; }
.progress-text { text-align: right; font-size: 0.8rem; color: #999; margin-bottom: 20px; }
.hold-hint { font-size: 0.75rem; color: #b0b8d0; text-align: center; margin-bottom: 4px; min-height: 18px; }
.reveal-bar { height: 4px; background: #e8ecff; border-radius: 99px; margin-bottom: 16px; overflow: hidden; }
.reveal-bar-fill { height: 100%; width: 0%; background: #5b7fff; border-radius: 99px; }
.card { border: 1.5px solid #e2e8f0; border-radius: 16px; background: #f7f8fc; min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; margin-bottom: 20px; gap: 16px; user-select: none; -webkit-user-select: none; cursor: pointer; transition: background .15s; }
.card.pressing { background: #eef1ff; }
.card-en { font-size: 1.8rem; font-weight: 700; color: #3b4a6b; text-align: center; letter-spacing: 1px; transition: opacity .15s; }
.card-zh { font-size: 1.3rem; color: #718096; text-align: center; transition: opacity .15s; }
.card-divider { width: 40px; height: 2px; background: #e2e8f0; border-radius: 99px; }
.nav-row { display: flex; gap: 10px; align-items: center; }
.btn-prev { flex: 1; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 10px; background: #f7f8fc; color: #718096; font-size: 1rem; cursor: pointer; }
.btn-prev:hover:not(:disabled) { background: #e2e8f0; }
.btn-prev:disabled { opacity: .3; cursor: default; }
.btn-next { flex: 1; padding: 12px; background: #5b7fff; color: #fff; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; }
.btn-next:hover { background: #3a5fef; }
.card-counter { flex: 0 0 auto; font-size: 0.9rem; color: #a0aec0; min-width: 60px; text-align: center; }
#finish-btn { display: block; width: 100%; margin-top: 14px; padding: 12px; background: #f7f8fc; color: #5b7fff; border: 1.5px solid #5b7fff; border-radius: 10px; font-size: 1rem; cursor: pointer; }
#finish-btn:hover { background: #eef1ff; }
</style>
</head>
<body>
<div class="container">
  <div id="input-page">
    <h1>📚 词汇背诵</h1>
    <div class="vocab-checklist" id="vocab-list">
      <div class="vocab-loading">正在加载词库列表…</div>
    </div>
    <div class="selected-hint" id="selected-hint"></div>
    <div class="mode-row">
      <div class="mode-btn active" data-mode="both">全显示</div>
      <div class="mode-btn" data-mode="en2zh">英 → 中</div>
      <div class="mode-btn" data-mode="zh2en">中 → 英</div>
    </div>
    <button id="go-btn" disabled>开始背诵 →</button>
  </div>

  <div id="review-page">
    <div class="progress-bar-wrap"><div class="progress-bar" id="prog-bar"></div></div>
    <div class="progress-text" id="prog-text"></div>
    <div class="hold-hint" id="hold-hint"></div>
    <div class="reveal-bar"><div class="reveal-bar-fill" id="reveal-fill"></div></div>
    <div class="card" id="card">
      <div class="card-en" id="card-en"></div>
      <div class="card-divider"></div>
      <div class="card-zh" id="card-zh"></div>
    </div>
    <div class="nav-row">
      <button class="btn-prev" id="prev-btn">← 上一个</button>
      <span class="card-counter" id="card-counter"></span>
      <button class="btn-next" id="next-btn">下一个 →</button>
    </div>
    <button id="finish-btn">结束返回</button>
  </div>
</div>
<script>
(function(){
  const GITHUB_USERNAME = 'kirasunil4807-dotcom';
  const REPO_NAME = 'enlearner';
  const BASE = 'https://raw.githubusercontent.com/'+GITHUB_USERNAME+'/'+REPO_NAME+'/main/';

  var words=[], cur=0, mode='both';
  var revealed=false, pressTimer=null;
  var HOLD_MS=400;

  function $(id){ return document.getElementById(id); }
  function showPage(id){ ['input-page','review-page'].forEach(function(p){ $(p).style.display=p===id?'block':'none'; }); }

  // ---- 动态加载词库列表 ----
  (async function loadIndex(){
    try {
      var res = await fetch(BASE+'index.json');
      var list = await res.json();
      var container = $('vocab-list');
      container.innerHTML='';

      var allRow=document.createElement('div'); allRow.className='select-all-row';
      var allCb=document.createElement('input'); allCb.type='checkbox'; allCb.id='cb-all';
      var allLbl=document.createElement('label'); allLbl.htmlFor='cb-all'; allLbl.textContent='全选';
      allRow.appendChild(allCb); allRow.appendChild(allLbl);
      container.appendChild(allRow);

      list.forEach(function(item){
        var row=document.createElement('div'); row.className='vocab-item';
        var cb=document.createElement('input'); cb.type='checkbox'; cb.value=item.value; cb.id='cb-'+item.value; cb.className='vocab-cb';
        var lbl=document.createElement('label'); lbl.htmlFor='cb-'+item.value; lbl.textContent=item.label;
        row.appendChild(cb); row.appendChild(lbl);
        row.onclick=function(e){ if(e.target!==cb) cb.checked=!cb.checked; updateSelection(); };
        cb.onchange=updateSelection;
        container.appendChild(row);
      });

      allCb.onchange=function(){
        document.querySelectorAll('.vocab-cb').forEach(function(c){ c.checked=allCb.checked; });
        updateSelection();
      };
    } catch(e) {
      $('vocab-list').innerHTML='<div class="vocab-loading">词库列表加载失败</div>';
    }
  })();

  function getChecked(){ return Array.from(document.querySelectorAll('.vocab-cb:checked')).map(function(c){ return c.value; }); }

  function updateSelection(){
    var checked=getChecked(), all=document.querySelectorAll('.vocab-cb'), allCb=$('cb-all');
    if(allCb) allCb.checked=checked.length===all.length&&all.length>0;
    $('go-btn').disabled=checked.length===0;
    $('selected-hint').textContent=checked.length>0?'已选 '+checked.length+' 个词库':'';
  }

  document.querySelectorAll('.mode-btn').forEach(function(btn){
    btn.onclick=function(){
      document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active'); mode=btn.dataset.mode;
    };
  });

  $('go-btn').onclick=async function(){
    var selected=getChecked(); if(!selected.length) return;
    $('go-btn').textContent='正在加载…'; $('go-btn').disabled=true;
    try {
      var all=await Promise.all(selected.map(function(file){
        return fetch(BASE+'vocabulary/'+file+'.json').then(function(r){ if(!r.ok) throw new Error(file+' 加载失败'); return r.json(); });
      }));
      words=[];
      all.forEach(function(data){ data.forEach(function(item){ words.push({en:item.word.trim(), zh:item.translation.trim()}); }); });
      if(!words.length){ alert('所选词库内容为空！'); return; }
      cur=0; showPage('review-page'); renderCard();
    } catch(e) {
      alert('❌ 载入失败：'+e.message);
    } finally {
      $('go-btn').textContent='开始背诵 →'; updateSelection();
    }
  };

  function renderCard(){
    var w=words[cur], total=words.length;
    $('prog-bar').style.width=((cur+1)/total*100).toFixed(0)+'%';
    $('prog-text').textContent=(cur+1)+' / '+total;
    $('card-counter').textContent=(cur+1)+' / '+total;
    $('prev-btn').disabled=cur===0;
    $('next-btn').textContent=cur===total-1?'完成 ✓':'下一个 →';
    revealed=false;
    $('reveal-fill').style.transition='none'; $('reveal-fill').style.width='0%';
    $('card-en').textContent=w.en; $('card-zh').textContent=w.zh;
    if(mode==='both'){
      $('card-en').style.opacity='1'; $('card-zh').style.opacity='1'; $('hold-hint').textContent='';
    } else if(mode==='en2zh'){
      $('card-en').style.opacity='1'; $('card-zh').style.opacity='0'; $('hold-hint').textContent='按住显示中文';
    } else {
      $('card-en').style.opacity='0'; $('card-zh').style.opacity='1'; $('hold-hint').textContent='按住显示英文';
    }
  }

  function startPress(){
    if(mode==='both'||revealed) return;
    var fill=$('reveal-fill');
    fill.style.transition='width '+HOLD_MS+'ms linear'; fill.style.width='100%';
    $('card').classList.add('pressing');
    pressTimer=setTimeout(function(){
      revealed=true;
      if(mode==='en2zh') $('card-zh').style.opacity='1'; else $('card-en').style.opacity='1';
      $('hold-hint').textContent=''; $('card').classList.remove('pressing');
    }, HOLD_MS);
  }

  function endPress(){
    if(pressTimer){ clearTimeout(pressTimer); pressTimer=null; }
    $('card').classList.remove('pressing');
    if(!revealed){ var fill=$('reveal-fill'); fill.style.transition='width 0.15s linear'; fill.style.width='0%'; }
  }

  var card=$('card');
  card.addEventListener('mousedown', startPress);
  card.addEventListener('mouseup', endPress);
  card.addEventListener('mouseleave', endPress);
  card.addEventListener('touchstart', function(e){ e.preventDefault(); startPress(); }, {passive:false});
  card.addEventListener('touchend', function(e){ e.preventDefault(); endPress(); }, {passive:false});
  card.addEventListener('touchcancel', endPress);

  $('prev-btn').onclick=function(){ if(cur>0){ cur--; renderCard(); } };
  $('next-btn').onclick=function(){ if(cur<words.length-1){ cur++; renderCard(); } else { showPage('input-page'); } };
  $('finish-btn').onclick=function(){ showPage('input-page'); };
})();
</script>
</body>
</html>
